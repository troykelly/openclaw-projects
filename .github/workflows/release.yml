# Unified Release Workflow
# Consolidates npm-publish.yml and containers.yml tag-triggered builds
# into a single coordinated release pipeline.
#
# Trigger: push tag matching v*.*.*
# Flow: validate → test → publish-npm + publish-containers → release
#
# Part of Issue #1538
#
# Workflow interaction notes (#2534):
#   - The version bump commit pushed to main has [skip ci], so it does NOT
#     trigger ci.yml or containers.yml (GitHub Actions skips push events
#     with [skip ci] in commit message for branch pushes).
#   - The edge-restore commit also has [skip ci] for the same reason.
#   - Tag force-pushes do NOT respect [skip ci]; the re-entrancy guard
#     (commit message check) prevents infinite loops on tag re-triggers.
#   - containers.yml only triggers on push to main (not tags), so the tag
#     force-push does not trigger it.
#
# Rollback procedure:
#   1. npm unpublish @troykelly/openclaw-projects@<version> (within 72h)
#   2. Delete image tags: gh api -X DELETE repos/troykelly/openclaw-projects/packages/...
#   3. Delete GitHub Release: gh release delete v<version> --yes
#   4. Delete git tag: git tag -d v<version> && git push origin :refs/tags/v<version>
#   5. If version bump commit landed on main, revert it:
#      git revert <version-bump-sha> && git push origin main
#   6. If edge-restore commit landed, it is safe to leave (main already has :edge)

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# Serialize ALL release runs to prevent races on shared mutable targets
# (npm dist-tag latest, Docker :latest tag, GitHub Release).
# Two different tags pushed in quick succession must not run in parallel.
concurrency:
  group: release
  cancel-in-progress: false

# Top-level: no permissions. Each job declares its own.
permissions: {}

jobs:
  # ──────────────────────────────────────────────────────────────
  # 1. Validate: extract version from tag, bump version in all files
  # ──────────────────────────────────────────────────────────────
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.release-type.outputs.prerelease }}
      npm_tag: ${{ steps.release-type.outputs.npm_tag }}
      docker_latest: ${{ steps.release-type.outputs.docker_latest }}
      version_bump_sha: ${{ steps.commit-bump.outputs.version_bump_sha }}
      skip: ${{ steps.reentry-guard.outputs.skip }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          ref: main
          persist-credentials: false

      # Re-entrancy guard (#2525): When the tag is force-pushed to point to
      # the version bump commit, this workflow re-triggers. We detect this by
      # checking if the tagged commit's message starts with "chore(release):".
      # [skip ci] does NOT prevent tag push triggers — only this guard works.
      - name: Re-entrancy guard (skip if tag points to release commit)
        id: reentry-guard
        env:
          TAG_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          COMMIT_MSG=$(git log -1 --format=%s "${TAG_SHA}" 2>/dev/null || echo "")
          if [[ "${COMMIT_MSG}" == chore\(release\):* ]]; then
            echo "::notice::Tag already points to a release commit — skipping re-run"
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Setup Node.js
        if: steps.reentry-guard.outputs.skip != 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Install pnpm
        if: steps.reentry-guard.outputs.skip != 'true'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Extract and validate version from tag
        if: steps.reentry-guard.outputs.skip != 'true'
        id: version
        env:
          GIT_TAG_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          TAG="${GIT_TAG_REF#refs/tags/v}"
          echo "Extracted version: ${TAG}"

          # Validate semver using Node.js built-in URL-safe check + regex.
          # Avoids runtime npm install of semver package in a privileged job
          # (supply-chain risk: REPO_PAT is in scope during this step).
          # Regex implements SemVer 2.0.0 spec: no leading zeroes on numeric
          # segments, valid prerelease/build identifiers.
          export SEMVER_CHECK_TAG="${TAG}"
          node -e '
            const tag = process.env.SEMVER_CHECK_TAG;
            const re = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$/;
            if (!re.test(tag)) {
              console.error("::error::Tag must be valid semver: v" + tag);
              console.error("::error::See https://semver.org/ for valid format");
              process.exit(1);
            }
            console.log("Valid semver: " + tag);
          '

          echo "version=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Verify tag points to a commit on main
        if: steps.reentry-guard.outputs.skip != 'true'
        env:
          TAG_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Refuse to release from commits not on the protected main branch.
          # This prevents supply-chain attacks where a tag is pushed pointing
          # to an unreviewed commit (e.g., a feature branch or detached HEAD).
          echo "Tag commit: ${TAG_COMMIT}"
          echo "Main HEAD:  $(git rev-parse HEAD)"
          if ! git merge-base --is-ancestor "${TAG_COMMIT}" HEAD; then
            echo "::error::Tag commit ${TAG_COMMIT} is not an ancestor of main (HEAD=$(git rev-parse HEAD)). Refusing to release."
            echo "::error::Tags must point to commits that are on the main branch."
            exit 1
          fi
          echo "Verified: tag commit ${TAG_COMMIT} is an ancestor of main HEAD"

      - name: Bump version in all package files
        if: steps.reentry-guard.outputs.skip != 'true'
        env:
          FILE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Strip build metadata for file versions (files use clean semver)
          FILE_VERSION="${FILE_VERSION%%+*}"
          export FILE_VERSION

          echo "Setting version to ${FILE_VERSION} in all package files..."

          for file in \
            package.json \
            packages/openclaw-plugin/package.json \
            packages/openclaw-plugin/openclaw.plugin.json; do

            export TARGET_FILE="${file}"
            CURRENT=$(node -e "console.log(require('./' + process.env.TARGET_FILE).version)")
            if [ "${CURRENT}" = "${FILE_VERSION}" ]; then
              echo "SKIP: ${file} already at ${FILE_VERSION}"
            else
              node -e "
                const fs = require('fs');
                const f = process.env.TARGET_FILE;
                const pkg = JSON.parse(fs.readFileSync(f, 'utf8'));
                pkg.version = process.env.FILE_VERSION;
                fs.writeFileSync(f, JSON.stringify(pkg, null, 2) + '\n');
              "
              echo "UPDATED: ${file} ${CURRENT} → ${FILE_VERSION}"
            fi
          done

          # Update lockfile to reflect new versions
          pnpm install --lockfile-only

      # #2524 — Update compose file image tags from :edge to the release version.
      # Only production compose files are updated; devcontainer and test files
      # use build context and are excluded.
      - name: Update compose file image tags for release version
        if: steps.reentry-guard.outputs.skip != 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Strip build metadata — Docker tags do not support + character
          FILE_VERSION="${RELEASE_VERSION%%+*}"

          echo "Updating compose file image tags to ${FILE_VERSION}..."

          for f in docker-compose.yml docker-compose.traefik.yml docker-compose.quickstart.yml docker-compose.full.yml; do
            BEFORE=$(grep -c "ghcr.io/troykelly/openclaw-projects-[^:]*:edge" "${f}" || true)
            # Only replace project images (ghcr.io/troykelly/openclaw-projects-*), not third-party
            sed -i "s|ghcr.io/troykelly/openclaw-projects-\([^:]*\):edge|ghcr.io/troykelly/openclaw-projects-\1:${FILE_VERSION}|g" "${f}"
            AFTER=$(grep -c "ghcr.io/troykelly/openclaw-projects-[^:]*:${FILE_VERSION}" "${f}" || true)
            echo "UPDATED: ${f} — ${BEFORE} :edge → ${AFTER} :${FILE_VERSION}"
          done

      # #2524 — Validate that compose files no longer contain :edge for project images
      - name: Validate compose files after version bump
        if: steps.reentry-guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          ERRORS=0
          for f in docker-compose.yml docker-compose.traefik.yml docker-compose.quickstart.yml docker-compose.full.yml; do
            REMAINING=$(grep -c "ghcr.io/troykelly/openclaw-projects-[^:]*:edge" "${f}" || true)
            if [ "${REMAINING}" -gt 0 ]; then
              echo "::error::${f} still has ${REMAINING} :edge references after version bump"
              ERRORS=$((ERRORS + 1))
            fi
          done
          if [ "${ERRORS}" -gt 0 ]; then
            echo "::error::Compose file version bump failed — :edge references remain"
            exit 1
          fi
          echo "All compose files validated — no :edge references remain"

      - name: Update test snapshots for new version
        if: steps.reentry-guard.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Install dependencies so we can build and run snapshot tests.
          # The lockfile was just updated by the bump step above.
          pnpm install --frozen-lockfile
          pnpm --filter @troykelly/openclaw-projects run build
          pnpm exec vitest run packages/openclaw-plugin/tests/schema-snapshots.test.ts -u

      # Commit version bump (package files + compose files) and capture SHA.
      # Does NOT push yet — push happens atomically after edge restore (#2533).
      - name: Commit version bump to main
        id: commit-bump
        if: steps.reentry-guard.outputs.skip != 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          REPO_PAT: ${{ secrets.REPO_PAT }}
        run: |
          set -euo pipefail
          FILE_VERSION="${RELEASE_VERSION%%+*}"

          # Check if anything changed
          if git diff --quiet && git diff --cached --quiet; then
            echo "No version changes needed — files already at ${FILE_VERSION}"
            echo "VERSION_BUMP_SHA=$(git rev-parse HEAD)" >> "${GITHUB_ENV}"
            echo "version_bump_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            package.json \
            packages/openclaw-plugin/package.json \
            packages/openclaw-plugin/openclaw.plugin.json \
            packages/openclaw-plugin/tests/__snapshots__/schema-snapshots.test.ts.snap \
            pnpm-lock.yaml \
            docker-compose.yml \
            docker-compose.traefik.yml \
            docker-compose.quickstart.yml \
            docker-compose.full.yml

          git commit -m "chore(release): v${FILE_VERSION} [skip ci]"

          # Capture the version bump commit SHA explicitly (#2525, #2526).
          # Do NOT use HEAD~1 later — that is fragile if multiple commits are created.
          VERSION_BUMP_SHA=$(git rev-parse HEAD)
          echo "VERSION_BUMP_SHA=${VERSION_BUMP_SHA}" >> "${GITHUB_ENV}"
          echo "version_bump_sha=${VERSION_BUMP_SHA}" >> "${GITHUB_OUTPUT}"
          echo "Version bump commit: ${VERSION_BUMP_SHA}"

          # Configure remote URL with REPO_PAT to bypass branch protection.
          # Credentials are NOT persisted (persist-credentials: false on checkout).
          git remote set-url origin "https://x-access-token:${REPO_PAT}@github.com/${{ github.repository }}.git"

      # #2578 — Verify release version consistency BEFORE edge-restore.
      # verify-release-versions.sh checks that compose files reference :VERSION.
      # It must run while files still contain :VERSION (after version bump commit
      # but before the edge-restore step resets them back to :edge).
      - name: Verify release version consistency
        if: steps.reentry-guard.outputs.skip != 'true'
        env:
          FILE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          # Strip build metadata for comparison
          CHECK_VERSION="${FILE_VERSION%%+*}"
          echo "Verifying release version consistency for ${CHECK_VERSION}..."
          bash scripts/verify-release-versions.sh --version "${CHECK_VERSION}" --mode ci

      # #2577 — Upload versioned compose files BEFORE edge-restore.
      # The artifact must capture files with :VERSION tags, not :edge.
      # Downstream jobs (publish-npm, publish-github-packages, publish-containers,
      # release) download this artifact to overlay versioned files onto their
      # own checkout. Moving upload after edge-restore would deliver :edge files.
      - name: Upload bumped version files
        if: steps.reentry-guard.outputs.skip != 'true'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: version-bumped-files
          path: |
            package.json
            packages/openclaw-plugin/package.json
            packages/openclaw-plugin/openclaw.plugin.json
            packages/openclaw-plugin/tests/__snapshots__/schema-snapshots.test.ts.snap
            pnpm-lock.yaml
            docker-compose.yml
            docker-compose.traefik.yml
            docker-compose.quickstart.yml
            docker-compose.full.yml
          if-no-files-found: error
          retention-days: 3

      # #2526 — Restore compose files to :edge for main branch.
      # The version bump commit has versioned tags; this commit restores :edge
      # so that main always references edge builds for development.
      - name: Restore compose files to :edge after version bump
        if: steps.reentry-guard.outputs.skip != 'true'
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          FILE_VERSION="${RELEASE_VERSION%%+*}"

          echo "Restoring compose file image tags to :edge..."

          for f in docker-compose.yml docker-compose.traefik.yml docker-compose.quickstart.yml docker-compose.full.yml; do
            sed -i "s|ghcr.io/troykelly/openclaw-projects-\([^:]*\):${FILE_VERSION}|ghcr.io/troykelly/openclaw-projects-\1:edge|g" "${f}"
          done

          git add \
            docker-compose.yml \
            docker-compose.traefik.yml \
            docker-compose.quickstart.yml \
            docker-compose.full.yml

          git commit -m "chore(release): restore :edge image tags [skip ci]"

      # #2525 — Re-point the tag to the version bump commit (not the edge restore).
      # Uses the explicitly captured VERSION_BUMP_SHA, not HEAD~1.
      - name: Re-point tag to version bump commit and push
        if: steps.reentry-guard.outputs.skip != 'true'
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail

          echo "Moving tag ${RELEASE_TAG} to version bump commit ${VERSION_BUMP_SHA}"
          git tag -f "${RELEASE_TAG}" "${VERSION_BUMP_SHA}"

          # #2533 — Use --atomic to ensure all-or-nothing push semantics.
          # This pushes main (with both version bump + edge restore commits)
          # and the force-updated tag in a single atomic transaction.
          # Note: --force-with-lease is used for the tag only (it's being moved).
          # main is a fast-forward push and does not need --force.
          echo "Pushing main + tag atomically..."
          git push --atomic origin main "+refs/tags/${RELEASE_TAG}"

          # Verify remote refs match expected values
          REMOTE_TAG_SHA=$(git ls-remote origin "refs/tags/${RELEASE_TAG}" | cut -f1)
          if [ "${REMOTE_TAG_SHA}" != "${VERSION_BUMP_SHA}" ]; then
            echo "::error::Tag push verification failed: remote tag SHA (${REMOTE_TAG_SHA}) != expected (${VERSION_BUMP_SHA})"
            exit 1
          fi
          echo "Verified: remote tag ${RELEASE_TAG} points to ${VERSION_BUMP_SHA}"

          # Reset remote URL to remove REPO_PAT from .git/config
          # (minimize exposure of branch-protection-bypass token)
          git remote set-url origin "https://github.com/${{ github.repository }}.git"

      - name: Determine release type
        if: steps.reentry-guard.outputs.skip != 'true'
        id: release-type
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          if [[ "${RELEASE_VERSION}" == *-* ]]; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
            echo "docker_latest=false" >> "${GITHUB_OUTPUT}"

            # Channel-aware npm dist-tag: v1.0.0-beta.1 → beta, v1.0.0-rc.1 → rc
            # Strip build metadata first (v1.2.3-alpha.1+build → alpha.1)
            VERSION_NO_BUILD="${RELEASE_VERSION%%+*}"
            PRERELEASE_ID="${VERSION_NO_BUILD#*-}"
            CHANNEL="${PRERELEASE_ID%%.*}"
            case "${CHANNEL}" in
              alpha|beta|rc|canary)
                echo "npm_tag=${CHANNEL}" >> "${GITHUB_OUTPUT}"
                ;;
              *)
                echo "npm_tag=next" >> "${GITHUB_OUTPUT}"
                ;;
            esac
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
            echo "npm_tag=latest" >> "${GITHUB_OUTPUT}"
            echo "docker_latest=true" >> "${GITHUB_OUTPUT}"
          fi

  # ──────────────────────────────────────────────────────────────
  # 2. Test: full test suite must pass before any publishing
  # ──────────────────────────────────────────────────────────────
  test:
    name: Test suite
    needs: validate
    if: needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Build + start devcontainer services
        run: |
          docker compose -f .devcontainer/docker-compose.devcontainer.yml up -d --build

      - name: Fix workspace permissions (CI)
        run: |
          docker compose -f .devcontainer/docker-compose.devcontainer.yml exec -T -u root workspace \
            bash -lc "chown -R vscode:vscode /workspaces/openclaw-projects"

      - name: Install dependencies
        run: |
          docker compose -f .devcontainer/docker-compose.devcontainer.yml exec -T workspace \
            bash -lc "cd /workspaces/openclaw-projects && pnpm install --frozen-lockfile"

      - name: Lint
        run: |
          docker compose -f .devcontainer/docker-compose.devcontainer.yml exec -T workspace \
            bash -lc "cd /workspaces/openclaw-projects && pnpm run lint"

      - name: Typecheck
        run: |
          docker compose -f .devcontainer/docker-compose.devcontainer.yml exec -T workspace \
            bash -lc "cd /workspaces/openclaw-projects && pnpm build"

      - name: Build frontend
        run: |
          docker compose -f .devcontainer/docker-compose.devcontainer.yml exec -T workspace \
            bash -lc "cd /workspaces/openclaw-projects && pnpm app:build && pnpm css:build"

      - name: Build plugin package
        run: |
          docker compose -f .devcontainer/docker-compose.devcontainer.yml exec -T workspace \
            bash -lc "cd /workspaces/openclaw-projects && pnpm --filter @troykelly/openclaw-projects run build"

      - name: Run unit tests
        run: |
          docker compose -f .devcontainer/docker-compose.devcontainer.yml exec -T \
            workspace bash -lc "cd /workspaces/openclaw-projects && pnpm -s test:unit"

      - name: Run integration tests
        env:
          VOYAGERAI_API_KEY: ${{ secrets.VOYAGERAI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          docker compose -f .devcontainer/docker-compose.devcontainer.yml exec -T \
            -e VOYAGERAI_API_KEY \
            -e OPENAI_API_KEY \
            -e GEMINI_API_KEY \
            workspace bash -lc "cd /workspaces/openclaw-projects && pnpm -s test:integration"

      - name: Start E2E services
        run: |
          docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for E2E services
        run: |
          bash scripts/wait-for-services.sh

      - name: Connect workspace to E2E network
        run: |
          docker network connect openclaw-test-network \
            "$(docker compose -f .devcontainer/docker-compose.devcontainer.yml ps -q workspace)"

      - name: Run E2E tests
        run: |
          docker compose -f .devcontainer/docker-compose.devcontainer.yml exec -T \
            -e RUN_E2E=true \
            -e E2E_API_URL=http://openclaw-backend-test:3001 \
            workspace bash -lc "cd /workspaces/openclaw-projects && pnpm run test:e2e"

      - name: Teardown E2E services
        if: always()
        run: |
          docker compose -f docker-compose.test.yml down -v

      - name: Shutdown devcontainer
        if: always()
        run: |
          docker compose -f .devcontainer/docker-compose.devcontainer.yml down -v

  # ──────────────────────────────────────────────────────────────
  # 3a. Publish npm package to npmjs.org
  # ──────────────────────────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: [validate, test]
    if: needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write  # npm provenance

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download bumped version files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: version-bumped-files

      - name: Verify artifact overlay
        env:
          EXPECTED_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          EXPECTED="${EXPECTED_VERSION%%+*}"
          ACTUAL=$(node -e "console.log(require('./packages/openclaw-plugin/package.json').version)")
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "::error::Artifact overlay failed: plugin package.json has version ${ACTUAL}, expected ${EXPECTED}"
            exit 1
          fi
          echo "Artifact verified: plugin version is ${ACTUAL}"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: packages/openclaw-plugin

      - name: Build
        run: pnpm run build
        working-directory: packages/openclaw-plugin

      - name: Run plugin tests
        run: pnpm run test
        working-directory: packages/openclaw-plugin

      - name: Typecheck
        run: pnpm run typecheck
        working-directory: packages/openclaw-plugin

      - name: Check if version already published
        id: check-npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PUBLISH_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          # Strip build metadata
          CHECK_VERSION="${PUBLISH_VERSION%%+*}"
          if npm view "@troykelly/openclaw-projects@${CHECK_VERSION}" version 2>/dev/null; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "::warning::Version ${CHECK_VERSION} already exists on npm, skipping publish"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish to npm
        if: steps.check-npm.outputs.exists != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_DIST_TAG: ${{ needs.validate.outputs.npm_tag }}
        run: |
          set -euo pipefail
          pnpm publish --access public --no-git-checks --tag "${NPM_DIST_TAG}"
        working-directory: packages/openclaw-plugin

  # ──────────────────────────────────────────────────────────────
  # 3b. Publish npm package to GitHub Packages
  # ──────────────────────────────────────────────────────────────
  publish-github-packages:
    name: Publish to GitHub Packages
    needs: [validate, test]
    if: needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download bumped version files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: version-bumped-files

      - name: Verify artifact overlay
        env:
          EXPECTED_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          EXPECTED="${EXPECTED_VERSION%%+*}"
          ACTUAL=$(node -e "console.log(require('./packages/openclaw-plugin/package.json').version)")
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "::error::Artifact overlay failed: plugin package.json has version ${ACTUAL}, expected ${EXPECTED}"
            exit 1
          fi
          echo "Artifact verified: plugin version is ${ACTUAL}"

      - name: Setup Node.js for GitHub Packages
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@troykelly'

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: packages/openclaw-plugin

      - name: Build
        run: pnpm run build
        working-directory: packages/openclaw-plugin

      - name: Check if version already published
        id: check-ghp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          # Strip build metadata
          CHECK_VERSION="${PUBLISH_VERSION%%+*}"
          if npm view "@troykelly/openclaw-projects@${CHECK_VERSION}" version 2>/dev/null; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "::warning::Version ${CHECK_VERSION} already exists on GitHub Packages, skipping publish"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish to GitHub Packages
        if: steps.check-ghp.outputs.exists != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_DIST_TAG: ${{ needs.validate.outputs.npm_tag }}
        run: |
          set -euo pipefail
          pnpm publish --access public --no-git-checks --tag "${NPM_DIST_TAG}"
        working-directory: packages/openclaw-plugin

  # ──────────────────────────────────────────────────────────────
  # 3c. Build, scan, and publish container images
  # ──────────────────────────────────────────────────────────────
  publish-containers:
    name: Build ${{ matrix.image.name }}
    needs: [validate, test]
    if: needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: db
            context: .
            dockerfile: docker/postgres/Dockerfile
          - name: api
            context: .
            dockerfile: docker/api/Dockerfile
          - name: app
            context: .
            dockerfile: docker/app/Dockerfile
          - name: migrate
            context: .
            dockerfile: docker/migrate/Dockerfile
          - name: worker
            context: .
            dockerfile: docker/worker/Dockerfile
          - name: ha-connector
            context: .
            dockerfile: docker/ha-connector/Dockerfile
          - name: prompt-guard
            context: docker/prompt-guard
            dockerfile: docker/prompt-guard/Dockerfile
          - name: tmux-worker
            context: .
            dockerfile: docker/tmux-worker/Dockerfile
          - name: symphony-worker
            context: .
            dockerfile: docker/symphony-worker/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download bumped version files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: version-bumped-files

      - name: Verify artifact overlay
        env:
          EXPECTED_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          EXPECTED="${EXPECTED_VERSION%%+*}"
          ACTUAL=$(node -e "console.log(require('./package.json').version)")
          if [ "${ACTUAL}" != "${EXPECTED}" ]; then
            echo "::error::Artifact overlay failed: package.json has version ${ACTUAL}, expected ${EXPECTED}"
            exit 1
          fi
          echo "Artifact verified: package.json version is ${ACTUAL}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ghcr.io/troykelly/openclaw-projects-${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ needs.validate.outputs.docker_latest }}
            type=sha,prefix=
          labels: |
            org.opencontainers.image.title=openclaw-projects-${{ matrix.image.name }}
            org.opencontainers.image.description=OpenClaw Projects ${{ matrix.image.name }} container
            org.opencontainers.image.vendor=Troy Kelly
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true
          build-args: |
            BUILD_DATE=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VCS_REF=${{ needs.validate.outputs.version_bump_sha }}
            VERSION=${{ needs.validate.outputs.version }}
            OCI_CREATED=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            OCI_REVISION=${{ needs.validate.outputs.version_bump_sha }}
            OCI_VERSION=${{ needs.validate.outputs.version }}
            ${{ matrix.image.name == 'app' && format('VITE_SENTRY_DSN={0}', secrets.VITE_SENTRY_DSN) || '' }}
            ${{ matrix.image.name == 'app' && format('VITE_SENTRY_ENVIRONMENT=production') || '' }}
            ${{ matrix.image.name == 'app' && format('VITE_SENTRY_RELEASE={0}', needs.validate.outputs.version) || '' }}
            ${{ matrix.image.name == 'app' && format('SENTRY_ORG={0}', secrets.SENTRY_ORG) || '' }}
            ${{ matrix.image.name == 'app' && format('SENTRY_PROJECT={0}', secrets.SENTRY_PROJECT) || '' }}
            ${{ matrix.image.name == 'app' && format('SENTRY_URL={0}', secrets.SENTRY_URL) || '' }}
          # SENTRY_AUTH_TOKEN is passed as a BuildKit secret (not build-arg) to prevent
          # exposure in image layers/history. Only needed for the 'app' image build.
          secrets: |
            ${{ matrix.image.name == 'app' && format('sentry_auth_token={0}', secrets.SENTRY_AUTH_TOKEN) || '' }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        # Informational only — do not fail the build if Trivy itself has
        # transient download/install issues.
        continue-on-error: true
        with:
          image-ref: ghcr.io/troykelly/openclaw-projects-${{ matrix.image.name }}:${{ needs.validate.outputs.version }}
          format: 'sarif'
          output: 'trivy-results-${{ matrix.image.name }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@0d579ffd059c29b07949a3cce3983f0780820c98 # v4
        if: always() && hashFiles('trivy-results-${{ matrix.image.name }}.sarif') != ''
        with:
          sarif_file: 'trivy-results-${{ matrix.image.name }}.sarif'

  # ──────────────────────────────────────────────────────────────
  # 3d. Finalize Sentry/GlitchTip release (optional)
  # ──────────────────────────────────────────────────────────────
  finalize-sentry-release:
    name: Finalize Sentry release
    needs: [validate, publish-containers]
    if: needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check Sentry configuration
        id: sentry-check
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          if [ -n "${SENTRY_AUTH_TOKEN}" ]; then
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          else
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::Sentry not configured — skipping release finalization"
          fi

      - name: Checkout repository
        if: steps.sentry-check.outputs.configured == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.sentry-check.outputs.configured == 'true'
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '22'

      - name: Install pnpm
        if: steps.sentry-check.outputs.configured == 'true'
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Install dependencies
        if: steps.sentry-check.outputs.configured == 'true'
        run: pnpm install --frozen-lockfile

      - name: Finalize Sentry release
        if: steps.sentry-check.outputs.configured == 'true'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_URL: ${{ secrets.SENTRY_URL }}
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          pnpm exec sentry-cli releases new "${RELEASE_VERSION}"
          # GlitchTip may not support set-commits — treat as informational only.
          # sentry-cli v3 changed the API; self-hosted instances return HTTP 500.
          if ! pnpm exec sentry-cli releases set-commits "${RELEASE_VERSION}" --auto; then
            echo "::warning::set-commits failed (GlitchTip may not support this endpoint) — continuing"
          fi
          pnpm exec sentry-cli releases finalize "${RELEASE_VERSION}"

  # ──────────────────────────────────────────────────────────────
  # 4. Create GitHub Release with versioned compose files
  # ──────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [validate, publish-npm, publish-github-packages, publish-containers]
    if: needs.validate.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # #2576 — Checkout the version-bumped commit, not the original trigger SHA.
      # By the time this job runs, the tag has been force-pushed to point at
      # VERSION_BUMP_SHA (the chore(release) commit). Using the default checkout
      # (github.sha = original trigger commit) would give us :edge compose files.
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.validate.outputs.version_bump_sha }}
          fetch-depth: 0

      # #2527 — Compose files are now versioned in the tag checkout itself
      # (via #2524 and #2525). No sed replacement needed — just copy them.
      - name: Copy compose files from tag checkout
        run: |
          set -euo pipefail
          mkdir -p release

          for f in docker-compose.yml docker-compose.traefik.yml docker-compose.quickstart.yml docker-compose.full.yml; do
            cp "${f}" "release/${f}"
            echo "Copied release/${f}"
          done

      - name: Validate generated compose files
        env:
          # Stub values for required env vars so docker compose config can parse.
          # These are validation-only — they don't affect the generated files.
          POSTGRES_PASSWORD: stub-for-validation
          COOKIE_SECRET: stub-for-validation-min-length-44chars-padding
          S3_SECRET_KEY: stub-for-validation
          DOMAIN: example.com
          ACME_EMAIL: acme@example.com
          OPENCLAW_GATEWAY_TOKEN: stub-for-validation
        run: |
          set -euo pipefail
          for f in release/docker-compose.yml release/docker-compose.traefik.yml release/docker-compose.quickstart.yml release/docker-compose.full.yml; do
            echo "Validating ${f}..."
            docker compose -f "${f}" config --quiet 2>&1 || {
              echo "::error::Generated ${f} is invalid YAML"
              docker compose -f "${f}" config 2>&1 || true
              exit 1
            }
          done
          echo "All compose files validated successfully"

      - name: Create codebase tarball
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          tar czf "release/openclaw-projects-${RELEASE_VERSION}.tar.gz" \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.pnpm-store \
            --exclude=dist \
            --exclude=coverage \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='*.sarif' \
            --transform "s,^\\./,openclaw-projects-${RELEASE_VERSION}/," \
            .

      - name: Generate release body
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail
          # Strip build metadata — Docker tags don't support + character
          RELEASE_VERSION="${RELEASE_VERSION%%+*}"
          cat > release/RELEASE_BODY.md << BODYEOF
          ## Installation

          ### npm
          \`\`\`bash
          npm install @troykelly/openclaw-projects@${RELEASE_VERSION}
          \`\`\`

          ### Docker Compose
          Download the versioned compose files from the release assets below.
          All project images are pinned to \`${RELEASE_VERSION}\`.

          ### Container images

          | Image | Pull command |
          |-------|-------------|
          | db | \`docker pull ghcr.io/troykelly/openclaw-projects-db:${RELEASE_VERSION}\` |
          | api | \`docker pull ghcr.io/troykelly/openclaw-projects-api:${RELEASE_VERSION}\` |
          | app | \`docker pull ghcr.io/troykelly/openclaw-projects-app:${RELEASE_VERSION}\` |
          | migrate | \`docker pull ghcr.io/troykelly/openclaw-projects-migrate:${RELEASE_VERSION}\` |
          | worker | \`docker pull ghcr.io/troykelly/openclaw-projects-worker:${RELEASE_VERSION}\` |
          | ha-connector | \`docker pull ghcr.io/troykelly/openclaw-projects-ha-connector:${RELEASE_VERSION}\` |
          | prompt-guard | \`docker pull ghcr.io/troykelly/openclaw-projects-prompt-guard:${RELEASE_VERSION}\` |
          | tmux-worker | \`docker pull ghcr.io/troykelly/openclaw-projects-tmux-worker:${RELEASE_VERSION}\` |
          | symphony-worker | \`docker pull ghcr.io/troykelly/openclaw-projects-symphony-worker:${RELEASE_VERSION}\` |
          BODYEOF

      - name: Create GitHub Release (draft)
        id: create_release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: v${{ needs.validate.outputs.version }}
          draft: true
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          generate_release_notes: true
          body_path: release/RELEASE_BODY.md
          files: |
            release/docker-compose.yml
            release/docker-compose.traefik.yml
            release/docker-compose.quickstart.yml
            release/docker-compose.full.yml
            release/openclaw-projects-${{ needs.validate.outputs.version }}.tar.gz

      - name: Undraft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          gh release edit "${RELEASE_TAG}" --draft=false
